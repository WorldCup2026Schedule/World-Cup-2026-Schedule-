<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate World Cup Hub</title>
    <style>
        /* Sleek Dark Mode */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        
        .banner {
            background-color: #ff2a2a;
            color: white;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 2px;
            white-space: nowrap;
            overflow: hidden;
        }
        
        .banner-text {
            display: inline-block;
            animation: scrollBanner 20s linear infinite;
        }

        @keyframes scrollBanner {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .countdown-container {
            text-align: center;
            padding: 20px;
            background: linear-gradient(90deg, #1f1f1f, #2a2a2a);
            border-bottom: 2px solid #333;
        }
        
        #timer {
            font-size: 2em;
            color: #00ffcc;
            font-weight: bold;
            margin-top: 10px;
        }

        .tabs {
            display: flex;
            justify-content: center;
            background-color: #1f1f1f;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            background-color: inherit;
            color: white;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 20px;
            font-size: 1em;
            transition: 0.3s;
        }
        
        .tab-btn:hover { background-color: #333; }
        .tab-btn.active {
            background-color: #00ffcc;
            color: #121212;
            font-weight: bold;
            border-radius: 5px 5px 0 0;
        }

        .tab-content {
            display: none;
            padding: 20px;
            text-align: center;
        }
        
        .tab-content.active {
            display: block;
            animation: fadeEffect 0.5s;
        }

        @keyframes fadeEffect {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        .card {
            background-color: #1f1f1f;
            border-radius: 8px;
            padding: 15px;
            margin: 10px auto;
            max-width: 600px;
            border-left: 5px solid #00ffcc;
            text-align: center;
        }

        .past-card {
            border-left: 5px solid #ff2a2a;
        }

        .time-24 { font-size: 1.4em; font-weight: bold; color: #00ffcc; margin: 5px 0 0 0; }
        .time-12 { font-size: 0.8em; color: #aaaaaa; margin: 0; }
        .score-display { font-size: 2em; font-weight: bold; color: #ff2a2a; margin: 10px 0; }

        /* Dropdown Styling */
        .tz-controls { margin: 20px auto; text-align: center; }
        select {
            padding: 10px; font-size: 1em; background-color: #333;
            color: white; border: 1px solid #00ffcc; border-radius: 5px; cursor: pointer;
        }

        /* Group Tables Grid */
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }
        .group-table {
            background-color: #1f1f1f;
            border-radius: 8px;
            padding: 15px;
            border-top: 4px solid #00ffcc;
        }
        .group-table h3 { margin-top: 0; color: #00ffcc; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 8px; border-bottom: 1px solid #333; }
        th { color: #aaaaaa; font-size: 0.9em; }

        /* Top Scorers List */
        .scorer-item {
            display: flex;
            justify-content: space-between;
            background-color: #1f1f1f;
            padding: 15px;
            margin: 10px auto;
            max-width: 500px;
            border-radius: 8px;
            border-left: 5px solid #ffaa00;
            font-size: 1.2em;
        }
        .goals { font-weight: bold; color: #ffaa00; }
    </style>
</head>
<body>

    <!-- Live Scores Banner -->
    <div class="banner">
        <div class="banner-text">🔥 WELCOME TO THE ULTIMATE 2026 WORLD CUP TRACKER - 48 TEAMS, 104 MATCHES, 1 CHAMPION 🔥</div>
    </div>

    <!-- Countdown Timer -->
    <div class="countdown-container">
        <h2>⏳ Next Match Kickoff</h2>
        <div id="timer">Loading...</div>
    </div>

    <!-- The Navigation Tabs -->
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'Schedule')">📅 Upcoming</button>
        <button class="tab-btn" onclick="openTab(event, 'Past')">✅ Past Results</button>
        <button class="tab-btn" onclick="openTab(event, 'Groups')">📊 Groups A-L</button>
        <button class="tab-btn" onclick="openTab(event, 'Scorers')">⚽ Top Scorers</button>
        <button class="tab-btn" onclick="openTab(event, 'Knockouts')">🏆 Knockouts</button>
    </div>

    <!-- Tab 1: Upcoming Matches -->
    <div id="Schedule" class="tab-content active">
        <h2>Remaining Group Stage Showdowns</h2>
        <div class="tz-controls">
            <label for="timezone-select">🌍 Choose Timezone: </label>
            <select id="timezone-select" onchange="renderMatches()"></select>
        </div>
        <div id="upcoming-container"></div>
    </div>

    <!-- Tab 2: Past Results -->
    <div id="Past" class="tab-content">
        <h2>All Results (Since June 11)</h2>
        <div id="past-container"></div>
    </div>

    <!-- Tab 3: Groups -->
    <div id="Groups" class="tab-content">
        <h2>Group Stage Standings</h2>
        <div class="groups-grid" id="groups-container"></div>
    </div>

    <!-- Tab 4: Top Scorers -->
    <div id="Scorers" class="tab-content">
        <h2>Golden Boot Race</h2>
        <div id="scorers-container"></div>
    </div>

    <!-- Tab 5: Knockouts -->
    <div id="Knockouts" class="tab-content">
        <h2>Knockout Bracket</h2>
        <p>Awaiting final 32 teams from the Group Stage...</p>
    </div>

    <script>
        // Tab Switching Logic
        function openTab(evt, tabName) {
            let tabcontent = document.getElementsByClassName("tab-content");
            for (let i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
                tabcontent[i].classList.remove("active");
            }
            let tablinks = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < tablinks.length; i++) {
                tablinks[i].classList.remove("active");
            }
            document.getElementById(tabName).style.display = "block";
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // Timezone Magic
        const userTZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
        const select = document.getElementById("timezone-select");
        const options = [
            { val: userTZ, text: "📍 My Local Time (" + userTZ.split('/')[1]?.replace('_', ' ') + ")" },
            { val: "America/Mexico_City", text: "Mexico City (CDMX)" },
            { val: "America/New_York", text: "Eastern Time (EST)" },
            { val: "America/Los_Angeles", text: "Pacific Time (PST)" },
            { val: "Europe/London", text: "UK Time (GMT)" },
            { val: "Asia/Tokyo", text: "Japan Time (JST)" }
        ];
        options.forEach(opt => {
            let el = document.createElement("option");
            el.value = opt.val; el.text = opt.text;
            select.add(el);
        });

        // --- MASTER DATA LISTS ---

        // 1. All Matches (You can keep adding to this list!)
        const matches = [
            // Opening Matches (June 11 & 12)
            { home: "Mexico", away: "Poland", group: "A", status: "past", score: "2 - 1", utcTime: "2026-06-11T20:00:00Z" },
            { home: "USA", away: "Wales", group: "B", status: "past", score: "3 - 0", utcTime: "2026-06-12T19:00:00Z" },
            { home: "Canada", away: "South Africa", group: "C", status: "past", score: "1 - 1", utcTime: "2026-06-12T22:00:00Z" },
            
            // Recent Past Matches
            { home: "Colombia", away: "DR Congo", group: "K", status: "past", score: "1 - 0", utcTime: "2026-06-23T16:00:00Z" },
            { home: "France", away: "Iraq", group: "I", status: "past", score: "3 - 0", utcTime: "2026-06-23T19:00:00Z" },
            
            // Upcoming Matches (June 24+ until knockouts)
            { home: "Switzerland", away: "Canada", group: "C", status: "upcoming", score: "", utcTime: "2026-06-24T19:00:00Z" },
            { home: "Bosnia & Herzegovina", away: "Qatar", group: "E", status: "upcoming", score: "", utcTime: "2026-06-24T19:00:00Z" },
            { home: "Scotland", away: "Brazil", group: "F", status: "upcoming", score: "", utcTime: "2026-06-24T22:00:00Z" },
            { home: "Morocco", away: "Haiti", group: "G", status: "upcoming", score: "", utcTime: "2026-06-24T22:00:00Z" },
            { home: "Czechia", away: "Mexico", group: "A", status: "upcoming", score: "", utcTime: "2026-06-25T01:00:00Z" },
            { home: "South Africa", away: "South Korea", group: "C", status: "upcoming", score: "", utcTime: "2026-06-25T01:00:00Z" },
            { home: "Argentina", away: "Egypt", group: "D", status: "upcoming", score: "", utcTime: "2026-06-26T19:00:00Z" },
            { home: "Germany", away: "Japan", group: "H", status: "upcoming", score: "", utcTime: "2026-06-27T22:00:00Z" }
        ];

        // 2. Groups A-L Standings
        const groupsData = {
            "A": [{team: "Mexico", pts: 3}, {team: "Poland", pts: 0}, {team: "Czechia", pts: 0}, {team: "TBA", pts: 0}],
            "B": [{team: "USA", pts: 3}, {team: "Wales", pts: 0}, {team: "TBA", pts: 0}, {team: "TBA", pts: 0}],
            "C": [{team: "Canada", pts: 1}, {team: "South Africa", pts: 1}, {team: "Switzerland", pts: 0}, {team: "South Korea", pts: 0}],
            "D": [{team: "Argentina", pts: 0}, {team: "Egypt", pts: 0}, {team: "TBA", pts: 0}, {team: "TBA", pts: 0}],
            "E": [{team: "Bosnia & Herzegovina", pts: 0}, {team: "Qatar", pts: 0}, {team: "TBA", pts: 0}, {team: "TBA", pts: 0}],
            "F": [{team: "Brazil", pts: 0}, {team: "Scotland", pts: 0}, {team: "TBA", pts: 0}, {team: "TBA", pts: 0}],
            "G": [{team: "Morocco", pts: 0}, {team: "Haiti", pts: 0}, {team: "TBA", pts: 0}, {team: "TBA", pts: 0}],
            "H": [{team: "Germany", pts: 0}, {team: "Japan", pts: 0}, {team: "TBA", pts: 0}, {team: "TBA", pts: 0}],
            "I": [{team: "France", pts: 3}, {team: "Norway", pts: 3}, {team: "Senegal", pts: 0}, {team: "Iraq", pts: 0}],
            "J": [{team: "Spain", pts: 0}, {team: "Nigeria", pts: 0}, {team: "TBA", pts: 0}, {team: "TBA", pts: 0}],
            "K": [{team: "Portugal", pts: 3}, {team: "Colombia", pts: 3}, {team: "DR Congo", pts: 0}, {team: "Uzbekistan", pts: 0}],
            "L": [{team: "Croatia", pts: 3}, {team: "Panama", pts: 0}, {team: "TBA", pts: 0}, {team: "TBA", pts: 0}]
        };

        // 3. Top Scorers Data
        const scorers = [
            { player: "K. Mbappé", team: "France", goals: 2 },
            { player: "S. Giménez", team: "Mexico", goals: 2 },
            { player: "C. Pulisic", team: "USA", goals: 1 },
            { player: "B. Fernandes", team: "Portugal", goals: 1 }
        ];

        // --- RENDER FUNCTIONS ---

        function renderMatches() {
            const tz = document.getElementById("timezone-select").value;
            const upcomingDiv = document.getElementById("upcoming-container");
            const pastDiv = document.getElementById("past-container");
            
            upcomingDiv.innerHTML = ""; pastDiv.innerHTML = "";

            matches.forEach(match => {
                const date = new Date(match.utcTime);
                const time24 = date.toLocaleTimeString('en-US', { timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: false });
                const time12 = date.toLocaleTimeString('en-US', { timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: true });
                const day = date.toLocaleDateString('en-US', { timeZone: tz, weekday: 'short', month: 'short', day: 'numeric' });

                const card = document.createElement("div");
                card.className = "card " + (match.status === "past" ? "past-card" : "");
                
                if(match.status === "past") {
                    card.innerHTML = `
                        <h3>${match.home} vs. ${match.away}</h3>
                        <p style="color: #aaaaaa; margin: 0;">Group ${match.group} • ${day}</p>
                        <div class="score-display">${match.score}</div>
                        <p style="color: #aaaaaa; margin: 0;">Full Time</p>
                    `;
                    pastDiv.appendChild(card);
                } else {
                    card.innerHTML = `
                        <h3>${match.home} vs. ${match.away}</h3>
                        <p style="color: #aaaaaa; margin-bottom: 5px;">Group ${match.group} • ${day}</p>
                        <p class="time-24">${time24}</p>
                        <p class="time-12">${time12}</p>
                    `;
                    upcomingDiv.appendChild(card);
                }
            });
        }

        function renderGroups() {
            const container = document.getElementById("groups-container");
            for (const [groupLetter, teams] of Object.entries(groupsData)) {
                let tableRows = teams.map(t => `<tr><td>${t.team}</td><td>${t.pts}</td></tr>`).join("");
                container.innerHTML += `
                    <div class="group-table">
                        <h3>Group ${groupLetter}</h3>
                        <table>
                            <tr><th>Team</th><th>Pts</th></tr>
                            ${tableRows}
                        </table>
                    </div>
                `;
            }
        }

        function renderScorers() {
            const container = document.getElementById("scorers-container");
            scorers.forEach(s => {
                container.innerHTML += `
                    <div class="scorer-item">
                        <span>${s.player} <small style="color:#aaaaaa">(${s.team})</small></span>
                        <span class="goals">${s.goals} Goals</span>
                    </div>
                `;
            });
        }

        // Run functions to build the page
        renderMatches();
        renderGroups();
        renderScorers();

        // Countdown to the first upcoming match in the list
        const nextMatchTime = new Date(matches.find(m => m.status === "upcoming").utcTime).getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const distance = nextMatchTime - now;
            if (distance < 0) {
                document.getElementById("timer").innerHTML = "MATCH IN PROGRESS!";
                return;
            }
            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);
            document.getElementById("timer").innerHTML = `${d}d ${h}h ${m}m ${s}s`;
        }, 1000);
    </script>
</body>
</html>
